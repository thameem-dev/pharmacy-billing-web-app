{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stock Details</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- DataTables -->
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    body {
      background-image: url("{% static 'images/bcg.jpg' %}");
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      font-family: 'Poppins', sans-serif;
    }

    .container {
      max-width: 900px;
    }

    h2 {
      color: #0d6efd;
    }

    #stockTable_filter {
      display: none !important;
    }

    table thead th {
      background: #0d6efd !important;
      color: white !important;
      text-align: center;
    }

    table tbody td {
      text-align: center;
    }
  </style>
</head>

<body class="bg-light">

  {% include 'navbar.html' %}

  <div class="container py-4">

    <div class="card p-3 shadow">
      <div class="card-body p-3">

        <h2 class="mb-3 text-center fw-bold text-primary">
          MEDICINE STOCK DETAILS
        </h2>

        <!-- Search + PDF Button -->
        <div class="row mb-3">
          <div class="col-md-6">
            <input type="text" id="globalSearch" class="form-control"
                   placeholder="Search all fields">
          </div>
          <div class="col-md-6 text-end">
            <button id="downloadPdf" class="btn btn-success">
              Download
            </button>
          </div>
        </div>

        <div class="table-responsive">
          <table id="stockTable" class="table table-bordered  table-hover align-middle">
            <thead>
              <tr>
                <th>S.No</th>
                <th>Medicine Name</th>
                <th>Brand</th>
                <th>Quantity</th>
                <th>Unit Price</th>
              </tr>
            </thead>

            <tbody>
              {% for item in stock %}
              <tr>
                <td></td>
                <td>{{ item.mid.medicine_name }}</td>
                <td>{{ item.mid.brand }}</td>
                <td>{{ item.quantity }}</td>
                <td>{{ item.unit_price }}</td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>

      </div>
    </div>

  </div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- DataTables -->
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

  <!-- jsPDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>

  <script>
    $(document).ready(function () {

      var table = $('#stockTable').DataTable({
        pageLength: 20,
        order: [[1, "asc"]],
        columnDefs: [
          { orderable: false, targets: 0 }
        ]
      });

      // Auto S.No
      table.on('order.dt search.dt', function () {
        table.column(0, { search: 'applied', order: 'applied' })
          .nodes()
          .each(function (cell, i) {
            cell.innerHTML = i + 1;
          });
      }).draw();

      // Global Search
      $('#globalSearch').on('keyup', function () {
        table.search(this.value).draw();
      });

      // PDF Export
      $('#downloadPdf').on('click', function () {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        doc.setFontSize(14);
        doc.text("Medicine Stock Details", 14, 15);

        doc.autoTable({
          startY: 20,
          html: '#stockTable',
          theme: 'grid',
          styles: {
            halign: 'center'
          },
          headStyles: {
            fillColor: [40, 167, 69] // Green header
          }
        });

        doc.save('medicine_stock_details.pdf');
      });

    });
  </script>

</body>
</html>
