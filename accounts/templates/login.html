{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        .error-text {
            color: red;
            font-size: 13px;
            margin-top: 3px;
        }
    </style>
</head>

<body class="bg-light">

    <div class=" container d-flex justify-content-center align-items-center vh-90">
<div class=" container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4" style="width: 350px;">
        <h1 class="mt-4 mb-4 text-center fw-bold"
            style="
                background: linear-gradient(90deg, #0A3D62, #1B9CFC);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                font-size: 40px;
                letter-spacing: 2px;
                text-shadow: 0px 2px 4px rgba(0,0,0,0.2);
            ">
            MED-X
        </h1>

        <!-- Snackbar Trigger -->
        {% if messages %}
            {% for message in messages %}
            <script>
                window.onload = function () {
                    let toastEl = document.getElementById("snackbarToast");
                    let msg = document.getElementById("snackbarMessage");
                    msg.innerText = "{{ message }}";

                    if ("{{ message.tags }}" === "error") {
                        toastEl.classList.remove("bg-success");
                        toastEl.classList.add("bg-danger");
                    }

                    new bootstrap.Toast(toastEl).show();
                };
            </script>
            {% endfor %}
        {% endif %}

        <form method="POST" id="loginForm" autocomplete="off">
            {% csrf_token %}

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" name="username" id="username" class="form-control"
                       placeholder="Enter username" autocomplete="off">

                <div id="usernameError" class="error-text"></div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" name="password" id="password" class="form-control"
                       placeholder="Enter password" autocomplete="off">

                <div id="passwordError" class="error-text"></div>
            </div>

            <!-- Submit -->
            <button type="submit" id="loginBtn" class="mt-2 btn btn-primary w-100 mb-3" disabled>
                Login
            </button>

        </form>

    </div>
</div>

<!-- Snackbar -->
<div class="position-fixed top-0 start-50 translate-middle-x p-3" style="z-index: 9999">
    <div id="snackbarToast" class="toast align-items-center text-white bg-success border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="snackbarMessage">Message</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<!-- JS VALIDATION -->
<script>
    const username = document.getElementById("username");
    const password = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");

    let usernameValid = false;
    let passwordValid = false;

    // Validate Username Only
    function validateUsername() {
        const value = username.value.trim();

        if (value.length < 8 || value.length > 16 || value.includes(" ")) {
            document.getElementById("usernameError").innerText =
                "Username must be 8–16 characters with no spaces.";
            usernameValid = false;
        } else {
            document.getElementById("usernameError").innerText = "";
            usernameValid = true;
        }

        toggleButton();
    }

    // Validate Password Only
    function validatePassword() {
        const value = password.value.trim();

        if (value.length < 8 || value.length > 16 || value.includes(" ")) {
            document.getElementById("passwordError").innerText =
                "Password must be 8–16 characters with no spaces.";
            passwordValid = false;
        } else {
            document.getElementById("passwordError").innerText = "";
            passwordValid = true;
        }

        toggleButton();
    }

    // Enable button only when both are valid
    function toggleButton() {
        loginBtn.disabled = !(usernameValid && passwordValid);
    }

    username.addEventListener("input", validateUsername);
    password.addEventListener("input", validatePassword);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
