{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign Up</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        .error-text {
            color: red;
            font-size: 13px;
            margin-top: 2px;
        }
    </style>
</head>

<body class="bg-light">
{%include 'navbar.html'%}
<div class="container d-flex justify-content-center align-items-center mt-4">
    <div class="card shadow p-4" style="width: 500px;">

        <h2 class="text-primary fw-bold text-center mb-4">ADD USER</h2>

        <form method="POST" id="signupForm" action="{% url 'adduser' %}" class="p-2">
            {% csrf_token %}

            <!-- First Name -->
            <div class="mb-3">
                <label class="form-label fw-semibold">First Name</label>
                <input type="text" id="firstName" name="first_name" class="form-control"
                       placeholder="Enter first name">

                <div id="firstNameError" class="error-text"></div>
            </div>

            <!-- Last Name -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Last Name</label>
                <input type="text" id="lastName" name="last_name" class="form-control"
                       placeholder="Enter last name">

                <div id="lastNameError" class="error-text"></div>
            </div>

            <!-- Email -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" id="email" name="email" class="form-control"
                       placeholder="Enter your email">

                <div id="emailError" class="error-text"></div>
            </div>

            <!-- Role -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Role</label>
                <select name="role" id="role" class="form-select">
                    <option value="" disabled selected>Select role</option>
                    <option value="biller">Biller</option>
                    <option value="system_admin">System Admin</option>
                    <option value="manager">Manager</option>
                    <option value="inventory">Inventory</option>
                </select>

                <div id="roleError" class="error-text"></div>
            </div>

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" id="username" name="username" class="form-control"
                       placeholder="Choose username">

                <div id="usernameError" class="error-text"></div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" id="password" name="password" class="form-control"
                       placeholder="Create password">

                <div id="passwordError" class="error-text"></div>
            </div>

            <!-- Submit -->
            <button type="submit" id="submitBtn" class="btn btn-primary w-100 mb-3" disabled>
                Sign Up
            </button>

        </form>
    </div>
</div>

<div class="position-fixed top-0 start-50 translate-middle-x p-3" style="z-index: 9999">
    <div id="snackbarToast" class="toast align-items-center text-white bg-success border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body" id="snackbarMessage">Message</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<!-- JavaScript Validation -->
<script>
    const firstName = document.getElementById("firstName");
    const lastName = document.getElementById("lastName");
    const email = document.getElementById("email");
    const role = document.getElementById("role");
    const username = document.getElementById("username");
    const password = document.getElementById("password");
    const submitBtn = document.getElementById("submitBtn");

    let valid = {
        first: false,
        last: false,
        email: false,
        role: false,
        username: false,
        password: false
    };

    // Validate First Name
    function validateFirstName() {
        const v = firstName.value;
    
        // Regex: starts with letters, optional single spaces between words, ends with letter
        const regex = /^[A-Za-z]+( [A-Za-z]+)*$/;
    
        if (!regex.test(v)) {
            document.getElementById("firstNameError").innerText =
                "First name must be 3–20 letters, spaces allowed only between words.";
            valid.first = false;
        } else if (v.length < 3 || v.length > 20) {
            document.getElementById("firstNameError").innerText =
                "First name must be 3–20 characters.";
            valid.first = false;
        } else {
            document.getElementById("firstNameError").innerText = "";
            valid.first = true;
        }
    
        toggleSubmit();
    }
    
    function validateLastName() {
        const v = lastName.value;
        const regex = /^[A-Za-z]+( [A-Za-z]+)*$/;
    
        if (!regex.test(v)) {
            document.getElementById("lastNameError").innerText =
                "Last name must be 3–20 letters, spaces allowed only between words.";
            valid.last = false;
        } else if (v.length < 3 || v.length > 20) {
            document.getElementById("lastNameError").innerText =
                "Last name must be 3–20 characters.";
            valid.last = false;
        } else {
            document.getElementById("lastNameError").innerText = "";
            valid.last = true;
        }
    
        toggleSubmit();
    }
    

    // Validate Email
    function validateEmail() {
        let v = email.value.trim();
        const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!regex.test(v)) {
            document.getElementById("emailError").innerText = "Enter a valid email.";
            valid.email = false;
        } else {
            document.getElementById("emailError").innerText = "";
            valid.email = true;
        }
        toggleSubmit();
    }

    // Validate Role
    function validateRole() {
        if (role.value === "") {
            document.getElementById("roleError").innerText = "Select a role.";
            valid.role = false;
        } else {
            document.getElementById("roleError").innerText = "";
            valid.role = true;

            // Auto focus next field
            username.focus();
        }
        toggleSubmit();
    }

    // Validate Username
    function validateUsername() {
        let v = username.value.trim();
        if (v.length < 8 || v.length > 16 || v.includes(" ")) {
            document.getElementById("usernameError").innerText =
                "Username must be 8–16 characters, no spaces.";
            valid.username = false;
        } else {
            document.getElementById("usernameError").innerText = "";
            valid.username = true;
        }
        toggleSubmit();
    }

    // Validate Password
    function validatePassword() {
        let v = password.value.trim();
        if (v.length < 8 || v.length > 16 || v.includes(" ")) {
            document.getElementById("passwordError").innerText =
                "Password must be 8–16 characters, no spaces.";
            valid.password = false;
        } else {
            document.getElementById("passwordError").innerText = "";
            valid.password = true;
        }
        toggleSubmit();
    }

    // Enable Submit Button Only if All Valid
    function toggleSubmit() {
        submitBtn.disabled = !(valid.first && valid.last && valid.email &&
                               valid.role && valid.username && valid.password);
    }

    // Event Listeners
    firstName.addEventListener("input", validateFirstName);
    lastName.addEventListener("input", validateLastName);
    email.addEventListener("input", validateEmail);
    role.addEventListener("change", validateRole);
    username.addEventListener("input", validateUsername);
    password.addEventListener("input", validatePassword);

    document.addEventListener("DOMContentLoaded", function() {
        {% if messages %}
            {% for message in messages %}
                const toastEl = document.getElementById("snackbarToast");
                const msg = document.getElementById("snackbarMessage");

                // Set message text
                msg.innerText = "{{ message }}";

                // Set background based on tag
                {% if message.tags == 'error' %}
                    toastEl.classList.remove("bg-success");
                    toastEl.classList.add("bg-danger");
                {% else %}
                    toastEl.classList.remove("bg-danger");
                    toastEl.classList.add("bg-success");
                {% endif %}

                // Show toast
                const toast = new bootstrap.Toast(toastEl, { delay: 3000 });
                toast.show();
            {% endfor %}
        {% endif %}
    });
</script>

</body>
</html>
